site_name: SleepVivo
site_description: VR sleep wellness software documentation
site_url: https://omoi0kane.github.io/SleepVivo-public/

repo_name: SleepVivo-public
repo_url: https://github.com/omoi0kane/SleepVivo-public

theme:
  name: material
  language: ja
  palette:
    primary: custom
    accent: custom
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - ユーザーガイド:
      - SleepVivo の基本機能: user-guide/basic-functions.md
      - インストール: user-guide/installation.md
      - 初回設定: user-guide/first-setup.md
      - 睡眠サポート: user-guide/sleep-support.md
      - スケジュール: user-guide/scheduler.md
      - 睡眠・起床の調整: user-guide/sleep-wake-settings.md
      - 自動化・連携[advanced]: user-guide/automations.md
      - 設定: user-guide/settings.md
      - VR Overlay: user-guide/vr-overlay.md
  - サポート:
      - FAQ: support/faq.md
      - サポート: support/support.md
  - Research Program:
      - 概要: research-program/overview.md
      - 同意と参加: research-program/consent.md
      - 収集される情報: research-program/collected-data.md
      - プライバシー: research-program/privacy.md
  - 開発情報:
      - リリースノート: development/release-notes.md
      - Public Shell: development/public-shell.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css
